{% extends "base.html" %}
{% block title %}Retórica - Flashcards{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4"><h2><i class="fas fa-comment-dots me-2"></i>Técnicas retóricas</h2><button class="btn btn-outline-secondary btn-sm" onclick="stopSpeech()"><i class="fas fa-stop-circle"></i> Detener lectura</button></div>
<div class="row g-4">
    {% for fig in figuras %}
    <div class="col-md-6 col-lg-4">
        <div class="card card-flash h-100">
            <div class="card-header bg-transparent border-0 pt-3">
                <div class="d-flex justify-content-between">
                    <div><h5 class="fw-bold">{{ fig.name }}</h5><span class="badge bg-secondary">{{ fig.category }}</span></div>
                    <button class="btn btn-sound btn-sm" onclick="speakText('{{ fig.name }}. {{ fig.teoria }} Ejemplo: {{ fig.ejemplo }}')"><i class="fas fa-volume-up"></i> Leer</button>
                </div>
            </div>
            <div class="card-body">
                <div class="bg-light p-2 rounded mb-2"><strong>Teoría:</strong><p class="mb-0 small">{{ fig.teoria }}</p></div>
                <div class="bg-warning bg-opacity-10 p-2 rounded mb-3"><strong>Ejemplo:</strong><p class="mb-0 fst-italic">“{{ fig.ejemplo }}”</p></div>
                <div class="exercise-area">
                    <label class="fw-semibold">✍️ {{ fig.ejercicio }}</label>
                    <textarea class="form-control mt-2" id="answer-{{ fig.id }}" rows="2" placeholder="Escribe tu respuesta..."></textarea>
                    <div class="mt-2">
                        <button class="btn btn-outline-success btn-sm" onclick="showSuggestion({{ fig.id }})">Ver sugerencia</button>
                    </div>
                    <div id="feedback-{{ fig.id }}" class="small mt-2" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
<script>
function showSuggestion(id){
    const user = document.getElementById('answer-'+id).value;
    const fb = document.getElementById('feedback-'+id);
    const figuras = {{ figuras | tojson | safe }};
    const fig = figuras.find(f => f.id === id);
    if(fig){
        fb.innerHTML = '<div class="alert alert-light border mt-2"><strong>📝 Tu respuesta:</strong> "' + (user.substring(0,100) || '(vacío)') + '"<br><strong>✨ Sugerencia:</strong> ' + fig.suggestedAnswer + '</div>';
        fb.style.display = 'block';
    }
}
</script>
{% endblock %}
