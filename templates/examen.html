{% extends "base.html" %}
{% block content %}
<h2><i class="fas fa-pen-alt"></i> Examen de {{ tema.capitalize() }} <span class="badge bg-primary">{{ num_preguntas }} preguntas</span></h2>
<div id="exam-container" class="mt-4"></div>
<div class="d-flex gap-3 justify-content-center mt-4"><button id="checkAllBtn" class="btn btn-primary">Revisar todas</button><button id="resetBtn" class="btn btn-secondary">Limpiar</button><a href="{{ url_for('examen') }}" class="btn btn-outline-success">Nuevo examen</a></div>
<script>
const tema="{{ tema }}";const num={{ num_preguntas }};let preguntas=[];
fetch('/api/generar_preguntas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tema:tema,num:num})}).then(res=>res.json()).then(data=>{preguntas=data;renderExam();});
function renderExam(){const container=document.getElementById('exam-container');container.innerHTML='';preguntas.forEach((q,idx)=>{const card=document.createElement('div');card.className='card mb-3 shadow-sm';card.innerHTML=`<div class="card-body"><h5><span class="badge bg-secondary me-2">${idx+1}</span>${escapeHtml(q.pregunta)}</h5><div class="mt-3">${q.opciones.map((opt,i)=>`<div class="form-check"><input class="form-check-input" type="radio" name="q${idx}" value="${escapeHtml(opt)}" id="q${idx}_${i}"><label for="q${idx}_${i}">${escapeHtml(opt)}</label></div>`).join('')}</div><button class="btn btn-sm btn-outline-primary mt-2" onclick="checkAnswer(${idx})">Comprobar</button><div id="fb${idx}" class="mt-2 small"></div></div>`;container.appendChild(card);});}
function checkAnswer(qidx){const selected=document.querySelector(`input[name="q${qidx}"]:checked`);const fb=document.getElementById(`fb${qidx}`);if(!selected){fb.innerHTML='<span class="text-warning">Selecciona una opción</span>';return;}const isCorrect=(selected.value===preguntas[qidx].respuesta_correcta);if(isCorrect){fb.innerHTML=`<span class="text-success">✓ Correcto: ${preguntas[qidx].respuesta_correcta}</span>`;}else{fb.innerHTML=`<span class="text-danger">✗ Incorrecto. Respuesta correcta: ${preguntas[qidx].respuesta_correcta}</span>`;}}
function escapeHtml(str){if(!str) return '';return str.replace(/[&<>]/g,function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;});}
document.getElementById('checkAllBtn').onclick=()=>{for(let i=0;i<preguntas.length;i++)checkAnswer(i);};
document.getElementById('resetBtn').onclick=()=>{document.querySelectorAll('input[type="radio"]').forEach(r=>r.checked=false);for(let i=0;i<preguntas.length;i++){const fb=document.getElementById(`fb${i}`);if(fb)fb.innerHTML='';}};
</script>
{% endblock %}
